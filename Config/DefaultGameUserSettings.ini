[/Script/Engine.GameUserSettings]
; 强制开启自定义画质，防止引擎默认拉到 Epic
ScalabilityLevelCustomized=True

; 关键：限制帧率到 60。防止 GPU 在主界面空跑发热导致断电
FrameRateLimit=60.000000

; 性能预设 (0=Low, 1=Medium, 2=High, 3=Epic)
; 1 或 2 对于 5070 Ti 是最安全的
sg.TextureQuality=1
sg.ShadowQuality=1
sg.ViewDistanceQuality=2
sg.AntiAliasingQuality=2
sg.PostProcessQuality=1
sg.EffectsQuality=1
sg.FoliageQuality=1
sg.ShadingQuality=1
sg.VisualEffectQuality=1

; 禁用不必要的高负载功能
bUseDynamicResolution=True